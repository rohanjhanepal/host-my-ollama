<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Qwen 2.5 Chat</title>
    <link rel="stylesheet" href="/static/ui.css">
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-box">
            <h3>Enter API Key</h3>
            <input type="password" id="key-input" placeholder="X-API-Key">
            <button onclick="saveKey()">Connect</button>
        </div>
    </div>

    <div id="chat-container"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const savedKey = localStorage.getItem('ollama_api_key');
        if (!savedKey) {
            document.getElementById('auth-overlay').style.display = 'flex';
        }

        function saveKey() {
            const key = document.getElementById('key-input').value;
            if (key) {
                localStorage.setItem('ollama_api_key', key);
                document.getElementById('auth-overlay').style.display = 'none';
            }
        }

        function startWordRenderer(botDiv, container) {
            const state = {
                pendingText: '',
                queue: [],
                active: false
            };

            function moveCompleteWordsToQueue() {
                const lastWhitespaceIndex = state.pendingText.search(/\s\S*$/);
                if (lastWhitespaceIndex === -1) {
                    if (/\s$/.test(state.pendingText)) {
                        state.queue.push(state.pendingText);
                        state.pendingText = '';
                    }
                    return;
                }

                const completeText = state.pendingText.slice(0, lastWhitespaceIndex + 1);
                state.pendingText = state.pendingText.slice(lastWhitespaceIndex + 1);

                const words = completeText.match(/\S+\s*/g) || [];
                state.queue.push(...words);
            }

            function renderNext() {
                if (!state.queue.length) {
                    state.active = false;
                    return;
                }

                botDiv.innerText += state.queue.shift();
                container.scrollTop = container.scrollHeight;
                setTimeout(renderNext, 35);
            }

            return {
                push(text) {
                    state.pendingText += text;
                    moveCompleteWordsToQueue();

                    if (!state.active && state.queue.length) {
                        state.active = true;
                        renderNext();
                    }
                },
                flush() {
                    if (state.pendingText) {
                        state.queue.push(state.pendingText);
                        state.pendingText = '';
                    }

                    if (!state.active && state.queue.length) {
                        state.active = true;
                        renderNext();
                    }
                }
            };
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const container = document.getElementById('chat-container');
            const key = localStorage.getItem('ollama_api_key');

            if (!input.value.trim()) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = input.value;
            container.appendChild(userDiv);

            const botDiv = document.createElement('div');
            botDiv.className = 'message bot';
            botDiv.innerText = '';
            container.appendChild(botDiv);
            const renderer = startWordRenderer(botDiv, container);

            const prompt = input.value;
            input.value = '';
            btn.disabled = true;

            try {
                const response = await fetch('/v1/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream',
                        'X-API-Key': key
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (response.status === 403) {
                    alert('Invalid API Key. Please refresh and try again.');
                    localStorage.removeItem('ollama_api_key');
                    location.reload();
                    return;
                }

                if (!response.ok || !response.body) {
                    throw new Error('Stream unavailable');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function processEvents() {
                    const events = buffer.split('\n\n');
                    buffer = events.pop() || '';

                    for (const event of events) {
                        const lines = event.split('\n');
                        let eventName = 'message';
                        const dataLines = [];

                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                eventName = line.slice(6).trim();
                            } else if (line.startsWith('data:')) {
                                dataLines.push(line.slice(5).trimStart());
                            }
                        }

                        if (!dataLines.length) {
                            continue;
                        }

                        const payload = JSON.parse(dataLines.join('\n'));
                        if (eventName === 'error') {
                            throw new Error(payload.message || 'Stream error');
                        }
                        if (eventName === 'done') {
                            renderer.flush();
                            continue;
                        }

                        renderer.push(payload.text || '');
                    }
                }

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) {
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    processEvents();
                }

                buffer += decoder.decode();
                processEvents();
                renderer.flush();
            } catch (err) {
                if (!botDiv.innerText) {
                    botDiv.innerText = 'Error connecting to server.';
                }
                alert('Error connecting to server.');
            } finally {
                btn.disabled = false;
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>
</html>
